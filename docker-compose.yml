services:
  pipeline:
    build:
      context: .
      dockerfile: services/pipeline/Dockerfile
    command: ["python", "-m", "nspo.engine.cli", "--input", "/workspace/data/synthetic/observations.json", "--rules", "/workspace/rules/patterns.yaml", "--output", "/workspace/data/derived/findings.json"]
    volumes:
      - ./data:/workspace/data
      - ./rules:/workspace/rules:ro

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NSPO_API_ADDR: ":8080"
      NSPO_DATA_DIR: "/workspace/data/derived"
      NSPO_REVIEW_STORE: "/workspace/data/runtime/reviews.json"
    volumes:
      - ./data:/workspace/data
    ports:
      - "8080:8080"
    depends_on:
      pipeline:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - api

  # Optional longitudinal store: docker compose --profile postgres up
  postgres:
    profiles: ["postgres"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nspo
      POSTGRES_USER: nspo
      POSTGRES_PASSWORD: nspo
    ports:
      - "5432:5432"
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/migrations/0001_init.sql:/docker-entrypoint-initdb.d/02-migration.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nspo -d nspo"]
      interval: 5s
      timeout: 5s
      retries: 10
