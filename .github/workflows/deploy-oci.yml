name: deploy-oci-neo
on:
  workflow_dispatch:
    inputs:
      action:
        description: validate | plan | apply
        required: true
        type: choice
        options:
          - validate
          - plan
          - apply
        default: plan
      image_tag:
        description: Image tag to deploy (vX.Y.Z or sha-...)
        required: true
        type: string
      image_source:
        description: Registry source for images
        required: true
        type: choice
        options:
          - ghcr
          - ocir
        default: ocir

permissions:
  contents: read
  packages: read

jobs:
  oci:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Pulumi CLI
        uses: pulumi/setup-pulumi@v2
        with:
          pulumi-version: 3.140.0

      - name: Make scripts executable
        run: chmod +x scripts/oci/*.sh

      - name: Resolve image refs
        id: images
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          IMAGE_SOURCE: ${{ inputs.image_source }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_TENANCY_NAMESPACE: ${{ secrets.OCI_TENANCY_NAMESPACE }}
        run: |
          set -euo pipefail
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          if [[ "$IMAGE_SOURCE" == "ocir" ]]; then
            : "${OCI_REGION:?OCI_REGION secret required for ocir}"
            : "${OCI_TENANCY_NAMESPACE:?OCI_TENANCY_NAMESPACE secret required for ocir}"
            BASE="${OCI_REGION}.ocir.io/${OCI_TENANCY_NAMESPACE}/nspo"
            echo "api=${BASE}/api:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
            echo "web=${BASE}/web:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
            echo "pipeline=${BASE}/pipeline:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "api=ghcr.io/${OWNER}/${REPO}/nspo-api:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
            echo "web=ghcr.io/${OWNER}/${REPO}/nspo-web:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
            echo "pipeline=ghcr.io/${OWNER}/${REPO}/nspo-pipeline:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Write OCI API key
        env:
          OCI_API_KEY: ${{ secrets.OCI_API_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${OCI_API_KEY}" ]]; then
            echo "OCI_API_PRIVATE_KEY not set"
            if [[ "${{ inputs.action }}" != "validate" ]]; then
              exit 1
            fi
            exit 0
          fi
          mkdir -p ~/.oci
          umask 077
          printf '%s\n' "$OCI_API_KEY" > ~/.oci/oci_api_key.pem

      - name: Export Terraform auth vars
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}
        run: |
          set -euo pipefail
          {
            echo "TF_VAR_tenancy_ocid=${OCI_TENANCY_OCID:-ocid1.tenancy.oc1..validate}"
            echo "TF_VAR_user_ocid=${OCI_USER_OCID:-ocid1.user.oc1..validate}"
            echo "TF_VAR_fingerprint=${OCI_FINGERPRINT:-https://example.invalid/fingerprint}"
            echo "TF_VAR_region=${OCI_REGION:-ap-singapore-1}"
            echo "TF_VAR_compartment_ocid=${OCI_COMPARTMENT_OCID:-ocid1.compartment.oc1..validate}"
            echo "TF_VAR_private_key_path=${HOME}/.oci/oci_api_key.pem"
            echo "NSPO_API_IMAGE=${{ steps.images.outputs.api }}"
            echo "NSPO_WEB_IMAGE=${{ steps.images.outputs.web }}"
            echo "NSPO_PIPELINE_IMAGE=${{ steps.images.outputs.pipeline }}"
            echo "NSPO_OCI_ENV=neo"
            echo "PULUMI_CONFIG_PASSPHRASE=${PULUMI_CONFIG_PASSPHRASE:-nspo-ci}"
            echo "TF_VAR_ssh_public_key<<EOF"
            echo "${OCI_SSH_PUBLIC_KEY:-ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIValidateOnlyKey nspo-validate}"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Validate
        if: ${{ inputs.action == 'validate' }}
        run: ./scripts/oci/validate.sh

      - name: Plan
        if: ${{ inputs.action == 'plan' || inputs.action == 'apply' }}
        run: ./scripts/oci/plan.sh

      - name: Upload plan artifact
        if: ${{ inputs.action == 'plan' || inputs.action == 'apply' }}
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-neo
          path: |
            infra/terraform/tfplan
            infra/terraform/tfplan.txt
          if-no-files-found: warn

      - name: Apply
        if: ${{ inputs.action == 'apply' }}
        run: ./scripts/oci/apply.sh
